backend:
  name: github
  repo: efesolutions24-alt/electra-frame-exports # Based on your screenshot
  branch: main

media_folder: "images" # Where your photos will go
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Body", name: "body", widget: "markdown"}
