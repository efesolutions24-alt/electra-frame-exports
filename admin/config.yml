backend:
  name: github
  repo: efesolutions24-alt/electra-frame-exports
  branch: main

# This section tells PagesCMS what to show in the dashboard
collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Site Title", name: "title", widget: "string"}
          - {label: "Main Content", name: "body", widget: "markdown"}
