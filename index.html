<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electra Frame Export Solutions</title>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      text-align: center;
    }
    header {
      background-color: #0d2c6c;
      color: white;
      padding: 40px 20px;
    }
    header h1 {
      margin: 0;
      font-size: 32px;
    }
    section {
      padding: 40px 20px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #0d2c6c;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    footer {
      background-color: #222;
      color: white;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Electra Frame Export Solutions</h1>
    <p>Reliable DG Sets & HVAC Solutions Delivered Globally</p>
  </header>

  <section>
    <h2>About Us</h2>
    <p>
      We specialize in Diesel Generators, Power Solutions, 
      and HVAC Systems for industrial and commercial projects.
    </p>
    <a href="/admin/" class="btn">Admin Login</a>
  </section>

  <footer>
    © 2026 Electra Frame Export Solutions. All rights reserved.
  </footer>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

</body>
</html>
